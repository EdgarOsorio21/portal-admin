<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Admin UMG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./login-ui.css" />
</head>
<body class="login-shell">
  <main class="login-layout">
    <section class="login-copy">
      <span class="eyebrow">Proyecto UMG</span>
      <h1>Gestion central para bases de datos conectadas.</h1>
      <p>Administra conexiones, revisa tablas y prepara el portal para PostgreSQL, MySQL y SQL Server.</p>
      <div class="login-engines" aria-label="Motores soportados">
        <span>PostgreSQL</span>
        <span>MySQL</span>
        <span>SQL Server</span>
      </div>
    </section>

    <section class="auth-panel" aria-label="Acceso al portal">
      <div id="login-screen" class="auth-card">
        <div class="auth-heading">
          <span class="eyebrow">Acceso privado</span>
          <h2>Iniciar sesion</h2>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Contrasena</label>
          <input type="password" id="password" placeholder="********" />
        </div>
        <button id="btn-login" class="auth-submit" type="button">Ingresar</button>
        <p id="login-message" class="message"></p>
        <button id="btn-show-register" class="auth-link" type="button">Crear una cuenta</button>
      </div>

      <div id="register-screen" class="auth-card hidden">
        <div class="auth-heading">
          <span class="eyebrow">Nuevo usuario</span>
          <h2>Registro</h2>
        </div>
        <div class="form-group">
          <label for="reg-name">Nombre</label>
          <input type="text" id="reg-name" placeholder="Tu nombre" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="tuemail@example.com" />
        </div>
        <div class="form-group">
          <label for="reg-password">Contrasena</label>
          <input type="password" id="reg-password" placeholder="********" />
        </div>
        <button id="btn-register" class="auth-submit" type="button">Registrarse</button>
        <p id="register-message" class="message"></p>
        <button id="btn-show-login" class="auth-link" type="button">Ya tengo cuenta</button>
      </div>
    </section>
  </main>

  <script src="./login.js"></script>
</body>
</html>
