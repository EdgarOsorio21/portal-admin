<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Admin</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <h1>Portal Admin</h1>

    <div id="login-screen" class="card">
      <h2>Login</h2>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="********" />
      </div>
      <button id="btn-login">Ingresar</button>
      <p id="login-message" class="message"></p>
      <p style="text-align:center; margin-top:10px;"><button id="btn-show-register" style="background:none; border:none; color:#2563eb; cursor:pointer; text-decoration:underline;">¿No tienes cuenta? Regístrate</button></p>
    </div>

    <div id="register-screen" class="card hidden">
      <h2>Registro</h2>
      <div class="form-group">
        <label for="reg-name">Nombre</label>
        <input type="text" id="reg-name" placeholder="Tu nombre" />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="tuemail@example.com" />
      </div>
      <div class="form-group">
        <label for="reg-password">Contraseña</label>
        <input type="password" id="reg-password" placeholder="********" />
      </div>
      <button id="btn-register">Registrarse</button>
      <p id="register-message" class="message"></p>
      <p style="text-align:center; margin-top:10px;"><button id="btn-show-login" style="background:none; border:none; color:#2563eb; cursor:pointer; text-decoration:underline;">¿Ya tienes cuenta? Inicia sesión</button></p>
    </div>
  </div>

  <script src="./login.js"></script>
</body>
</html>
